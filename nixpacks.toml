[phases.setup]
nixPkgs = ["nodejs_20", "python311"]

[phases.install]
cmds = [
  "pip3 install -r requirements.txt",
  "cd client && npm install --legacy-peer-deps"
]

[phases.build]
cmds = [
  "cd client && VITE_SUPABASE_URL=$VITE_SUPABASE_URL VITE_SUPABASE_ANON_KEY=$VITE_SUPABASE_ANON_KEY npm run build"
]

[start]
cmd = "gunicorn server:app --workers 4 --worker-class gthread --threads 2 --timeout 120 --bind 0.0.0.0:${PORT:-8000}"
